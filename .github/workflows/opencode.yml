name: OpenCode Reusable Workflow

on:
  workflow_call:
    secrets:
      model:
        description: 'Secret containing the model name (overrides model input)'
        required: false
    inputs:
      model:
        description: 'OLLAMA model to use'
        required: false
        type: string
        default: 'ollama-cloud/qwen3-coder:480b'
        
      prompt:
        description: 'Prompt for OpenCode'
        required: false
        type: string
      include_pr_context:
        description: 'Include PR info in context'
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  opencode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: ${{ inputs.include_pr_context && 0 || 1 }}

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.OLLAMA_API_KEY }}" ]; then
            echo "Error: OLLAMA_API_KEY secret is not set or empty"
            exit 1
          fi

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          #GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        with:
          model: ${{ inputs.model || secrets.model }}
          # use_github_token: true
          prompt: ${{ inputs.prompt }}
