name: Build ESP-IDF Firmware

on:
  push:
    branches: [main, feature/**, explore/**]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/setup-esp-idf@v4
        with:
          version: v6.0
          espfs: false

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          cd firmware
          idf.py build
