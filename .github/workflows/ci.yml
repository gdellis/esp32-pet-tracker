name: CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check if firmware build is needed
  check-firmware-changed:
    name: Check Firmware Changed
    runs-on: ubuntu-latest
    outputs:
      firmware_changed: ${{ steps.changed.outputs.firmware_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check firmware changes
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            git diff --name-only HEAD~1 HEAD | grep -qE '^firmware/' && echo "firmware_changed=true" >> $GITHUB_OUTPUT || echo "firmware_changed=false" >> $GITHUB_OUTPUT
          else
            git diff --name-only ${{ github.base_ref }} HEAD | grep -qE '^firmware/' && echo "firmware_changed=true" >> $GITHUB_OUTPUT || echo "firmware_changed=false" >> $GITHUB_OUTPUT
          fi

  # Lint C++ (non-blocking - clang-format style differs from ESP-IDF conventions)
  lint-cpp:
    name: Lint C++
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-clang-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install clang-format
        run: |
          pip install --break-system-packages clang-format

      - name: Run clang-format
        run: |
          find firmware/main -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror 2>&1 \
            || echo "clang-format warnings (ESP-IDF uses GNU style)"

  # Lint Shell
  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 shellcheck

  # Lint Markdown
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-markdownlint-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install markdownlint-cli2
        run: |
          npm install -g markdownlint-cli2

      - name: Run markdownlint-cli2
        run: |
          markdownlint-cli2 '**/*.md' '.markdownlint.json' \
            '!firmware/tests/build/**' \
            '!firmware/build/**' \
            '!third_party/**' \
            '!.opencode/**' \
            '!docs/plans/**'

  # Build ESP-IDF firmware (runs in Docker)
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    needs: check-firmware-changed
    if: needs.check-firmware-changed.outputs.firmware_changed == 'true'
    container: espressif/idf:v6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ccache and ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ~/.espressif
          key: esp32-ccache-${{ github.sha }}
          restore-keys: |
            esp32-ccache-

      - name: Build firmware
        run: |
          . /opt/esp/idf/export.sh
          ccache -M 100M
          ccache -z
          cd firmware
          idf.py build
          ccache -s

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: firmware/build
          retention-days: 1

  # Host-based unit tests
  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    needs: check-firmware-changed
    if: needs.check-firmware-changed.outputs.firmware_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake
        uses: actions/cache@v4
        with:
          path: ~/.cache/cmake
          key: ${{ runner.os }}-cmake-${{ hashFiles('firmware/tests/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: host-ccache-${{ github.sha }}
          restore-keys: |
            host-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential ccache

      - name: Configure & Build tests
        run: |
          ccache -M 50M
          ccache -z
          cd firmware/tests
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)
          ccache -s

      - name: Run tests
        run: |
          cd firmware/tests/build
          ./test_nmea_parser
          ./test_button_handler
          ./test_led_driver
          ./test_lora_driver
          ./test_geofence
          ./test_ble
