path = "~/.espressif"
esp_idf_json_path = "~/.espressif/tools"
tool_download_folder_name = "~/.espressif/dist"
tool_install_folder_name = "~/.espressif/tools"
target = ["esp32c3", "esp32c6"]
idf_versions = ["v6.0"]
tools_json_file = "tools/tools.json"
config_file_save_path = "~/projects/esp32-tracker/eim_config.toml"
non_interactive = true
wizard_all_questions = false
mirror = "https://github.com"
idf_mirror = "https://github.com"
pypi_mirror = "https://pypi.org/simple"
recurse_submodules = true
install_all_prerequisites = false
skip_prerequisites_check = false
cleanup = false
python_env_folder_name = "python"
activation_script_path_override = "~/.espressif/tools"
python_version_override = "python313"
create_bat_activation_script = false

[idf_features_per_version]
"v6.0" = ["core", "ci", "test-specific", "docs", "ide", "mcp"]

[idf_tools_per_version]
"v6.0" = ["riscv32-esp-elf-gdb", "esp-clang", "esp-clang-libs", "riscv32-esp-elf", "openocd-esp32", "ninja", "esp-rom-elfs", "qemu-riscv32", "cmake"]
